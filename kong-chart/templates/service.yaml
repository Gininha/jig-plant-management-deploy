apiVersion: v1
kind: Service
metadata:
  name: {{ include "kong-chart.fullname" . }}-proxy
  labels:
    {{- include "kong-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.proxy.type }}
  ports:
  - port: {{ .Values.proxy.http.servicePort }}
    targetPort: proxy
    protocol: TCP
    name: proxy
  - port: {{ .Values.proxy.https.servicePort }}
    targetPort: proxy-ssl
    protocol: TCP
    name: proxy-ssl
  selector:
    {{- include "kong-chart.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kong-chart.fullname" . }}-admin
  labels:
    {{- include "kong-chart.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: admin
    protocol: TCP
    name: admin
  - port: 8444
    targetPort: admin-ssl
    protocol: TCP
    name: admin-ssl
  selector:
    {{- include "kong-chart.selectorLabels" . | nindent 4 }}
